name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # پوش‌های خودکارِ ورک‌فلوهای به‌روزرسانی با GITHUB_TOKEN، تریگر push را فعال
  # نمی‌کنند؛ پس بعد از کامل‌شدنشان، دیپلوی را از این مسیر اجرا می‌کنیم تا
  # prices.json و news.json روی سایت هم بازنشر شوند.
  workflow_run:
    workflows: ['Update prices', 'Update news']
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

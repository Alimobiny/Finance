name: Update prices

on:
  schedule:
    # هر ساعت. برای نزدیک‌تر شدن به «لحظه‌ای» می‌توانی به '*/30 * * * *' تغییر دهی
    # (اگر ریپو public است، دقیقهٔ Actions نامحدود است).
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-prices.mjs
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/prices.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/prices.json
            git commit -m "chore(prices): به‌روزرسانی خودکار قیمت‌ها"
            git push
          else
            echo "بدون تغییر."
          fi
